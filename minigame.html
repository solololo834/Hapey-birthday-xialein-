<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hold Battle</title>

<style>
body{
    margin:0;
    background:#87CEEB;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:10px;
}

#game{
    display:flex;
    justify-content:center;
    gap:100px;
    margin-top:20px;
}

.playerBox{
    width:200px;
}

.character{
    width:150px;
    height:150px;
    object-fit:cover;
    border:3px solid black;
}

.meterBg{
    width:60px;
    height:300px;
    background:#ddd;
    margin:10px auto;
    position:relative;
    border:3px solid black;
}

.meter{
    position:absolute;
    bottom:0;
    width:100%;
    height:0%;
    background:limegreen;
}

#timer{
    font-size:30px;
    font-weight:bold;
}

#result{
    font-size:40px;
    margin-top:20px;
}
</style>
</head>
<body>

<h1>HOLD BATTLE</h1>

<div id="timer">20</div>

<div id="game">

    <div class="playerBox">
        <h2>Kamu</h2>

        <img id="playerImg" class="character" src="wek.png">

        <div class="meterBg">
            <div id="playerMeter" class="meter"></div>
        </div>
    </div>

    <div class="playerBox">
        <h2>choi hyun wikwok</h2>

        <img id="enemyImg" class="character" src="sle.jpg">

        <div class="meterBg">
            <div id="enemyMeter" class="meter"></div>
        </div>
    </div>

</div>

<div id="result"></div>

<script>
let holding = false;

let playerPower = 0;
let enemyPower = 0;

let timeLeft = 20;

alert("tahan layar untuk naikin meter");

const playerImg = document.getElementById("playerImg");
const enemyImg = document.getElementById("enemyImg");

function startHold(){
    holding = true;
    playerImg.src = "slemo.jpg";
}

function stopHold(){
    holding = false;
    playerImg.src = "wek.png";
}

document.addEventListener("mousedown", startHold);
document.addEventListener("mouseup", stopHold);

document.addEventListener("touchstart", startHold);
document.addEventListener("touchend", stopHold);

let enemyHolding = false;

setInterval(() => {

    enemyHolding = Math.random() < 0.6;

    if(enemyHolding){
        enemyImg.src = "sles.jpg";
    }else{
        enemyImg.src = "sle.jpg";
    }

}, 800);

const gameLoop = setInterval(() => {

    if(holding){
        playerPower += 1.5;
    }else{
        playerPower -= 0.5;
    }

    if(enemyHolding){
        enemyPower += 1.2;
    }else{
        enemyPower -= 0.3;
    }

    playerPower = Math.max(0, Math.min(100, playerPower));
    enemyPower = Math.max(0, Math.min(100, enemyPower));

    document.getElementById("playerMeter").style.height =
        playerPower + "%";

    document.getElementById("enemyMeter").style.height =
        enemyPower + "%";

}, 50);

const timerLoop = setInterval(() => {

    timeLeft--;

    document.getElementById("timer").textContent = timeLeft;

    if(timeLeft <= 0){

        clearInterval(timerLoop);
        clearInterval(gameLoop);

        if(playerPower > enemyPower){
            document.getElementById("result").innerHTML =
                "🏆 KAMU MENANG!";
        }
        else if(enemyPower > playerPower){
            document.getElementById("result").innerHTML =
                "💀 MUSUH MENANG!";
        }
        else{
            document.getElementById("result").innerHTML =
                "🤝 SERI!";
        }
    }

},1000);
</script>

</body>
          </html>
